<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - FitCheck</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
</head>

<body>
  <div class="login-container">
    <!-- Left Side - Branding -->
    <div class="login-left">
      <div class="branding">
        <div class="logo">
          <i class="fas fa-shopping-bag"></i>
        </div>
        <h1>FitCheck</h1>
        <p>Admin Dashboard</p>
      </div>
    </div>

    <!-- Right Side - Login Form -->
    <div class="login-right">
      <div class="auth-box">
        <div class="auth-header">
          <h2>Welcome Back!</h2>
          <p>Please login to your admin account</p>
        </div>

        <form method="POST" id="loginForm">
          <div class="form-group">
            <label for="email">
              <i class="fas fa-envelope"></i>
              Email Address
            </label>
            <input id="email" name="email" type="email" placeholder="Enter email-id here" required autocomplete="email" />
          </div>

          <div class="form-group">
            <label for="password">
              <i class="fas fa-lock"></i>
              Password
            </label>
            <div class="password-input">
              <input id="password" name="password" type="password" placeholder="Enter your password" required autocomplete="current-password" />
              <button type="button" class="toggle-password" onclick="togglePassword()">
                <i class="fas fa-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-password">Forgot Password?</a>
          </div>

          <button type="submit" class="btn-login">
            <span>Login</span>
            <i class="fas fa-arrow-right"></i>
          </button>
         {% if error %}
<div class="error-message" id="errorBox">
    <i class="fas fa-exclamation-circle"></i>
    <span>{{ error }}</span>
</div>
{% endif %}

        </form>

        <!-- <div class="auth-footer">
                    <p>Don't have an account? <a href="#">Contact Administrator</a></p>
                </div> -->
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>

</html>
